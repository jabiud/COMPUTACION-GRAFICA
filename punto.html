<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punto Centrado</title>

    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(to right, #ece9e6, #ffffff);
            font-family: Arial, sans-serif;
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
        }

        canvas {
            border: 4px solid black;
            border-radius: 10px;
            background: #f9f9f9;
        }

        a {
            margin-top: 20px; 
            text-decoration: none;
            background-color: #007BFF;
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 16px; 
        }

        a:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>

    <h2>PUNTO CENTRADO</h2>
    <h3>Realizado por: Joseph Abiud Cruz Acevedo</h3>

    <canvas id="myCanvas" width="500" height="500"></canvas>

    <a href="index.html">⬅ Volver al menú</a>

    <script>
        var canvas = document.getElementById("myCanvas");
        var ctx = canvas.getContext("2d");

        var centerX = canvas.width / 2;
        var centerY = canvas.height / 2;

        // SOMBRA
        ctx.shadowColor = "rgba(0,0,0,0.3)";
        ctx.shadowBlur = 15;

        // Degradado para el punto
        var gradient = ctx.createRadialGradient(centerX, centerY, 5, centerX, centerY, 25);
        gradient.addColorStop(0, "#89d631"); 
        gradient.addColorStop(1, "#a9e159");

        // Dibujar punto grande
        ctx.beginPath();
        ctx.arc(centerX, centerY, 100, 0, 2 * Math.PI);
        ctx.fillStyle = gradient;
        ctx.fill();

        // Contorno
        ctx.lineWidth = 2;
        ctx.strokeStyle = "#333";
        ctx.stroke();
    </script>

</body>
</html>
