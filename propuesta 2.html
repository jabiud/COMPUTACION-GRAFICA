<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Rotación de Cubo 3D</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial;
    background: linear-gradient(135deg,#1e3c72,#2a5298);
}

.volver{
    position:absolute;
    top:20px;
    left:20px;
    padding:10px 15px;
    background:#ff4d4d;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.info{
    position:absolute;
    bottom:20px;
    left:20px;
    color:white;
    background:rgba(0,0,0,0.4);
    padding:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<button class="volver" onclick="window.location.href='actividad 5.html'">
⬅ Volver
</button>

<div class="info" id="info">
Rotación X: 0 | Rotación Y: 0
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// Escena
const scene = new THREE.Scene();

// Cámara
const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);

// Render
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Cubo
const geometry = new THREE.BoxGeometry();
const material = new THREE.MeshStandardMaterial({color:0x00ffcc});
const cube = new THREE.Mesh(geometry, material);
scene.add(cube);

// Luz
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,5,5);
scene.add(light);

scene.add(new THREE.AmbientLight(0xffffff,0.3));

/* ===== EJES X Y Y (REFERENCIA) ===== */

// Eje X (rojo)
const materialX = new THREE.LineBasicMaterial({color:0xff0000});
const puntosX = [];
puntosX.push(new THREE.Vector3(-5,0,0));
puntosX.push(new THREE.Vector3(5,0,0));
const ejeX = new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(puntosX),
    materialX
);
scene.add(ejeX);

// Eje Y (verde)
const materialY = new THREE.LineBasicMaterial({color:0x00ff00});
const puntosY = [];
puntosY.push(new THREE.Vector3(0,-5,0));
puntosY.push(new THREE.Vector3(0,5,0));
const ejeY = new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(puntosY),
    materialY
);
scene.add(ejeY);

// Cámara
camera.position.set(0,0,5);

// Velocidad de rotación
let rotX = 0.02;
let rotY = 0.03;

const info = document.getElementById("info");

// Animación
function animar(){
    requestAnimationFrame(animar);

    // Rotación en X
    cube.rotation.x += rotX;

    // Rotación en Y
    cube.rotation.y += rotY;

    // Mostrar valores
    info.textContent =
        "Rotación X: " + cube.rotation.x.toFixed(2) +
        " | Rotación Y: " + cube.rotation.y.toFixed(2);

    renderer.render(scene, camera);
}

animar();

// Responsive
window.addEventListener("resize", ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
