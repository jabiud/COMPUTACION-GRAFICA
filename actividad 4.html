<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Actividad 4</title>

<style>
body{
    font-family: Arial;
    margin:0;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    background: linear-gradient(135deg,#446ebd,#8290a7,#529f80);
    color:rgb(0, 0, 0);
}   

/* TITULO */
h1{
    font-size:40px;
    margin-top:40px;
    margin-bottom:10px;
}

p{
    margin-bottom:30px;
    opacity:0.8;
}

/* CONTENEDOR */
.contenedor{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
}

/* CARDS */
.card{
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:20px;
    width:260px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
    transition:0.4s;
}

.card:hover{
    transform:translateY(-10px) scale(1.05);
}

/* IMAGEN */
.card img{
    width:100%;
    height:150px;
    object-fit:cover;
}

/* CONTENIDO */
.card-content{
    padding:20px;
}

.card h2{
    margin-bottom:10px;
}

/* BOTON EJERCICIO */
.card a{
    display:inline-block;
    margin-top:10px;
    padding:10px 15px;
    background: linear-gradient(45deg,#00c6ff,#0072ff);
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
    transition:0.3s;
}

.card a:hover{
    transform:scale(1.1);
}

/* BOTON VOLVER ABAJO */
.volver{
    margin:40px 0;
    padding:12px 20px;
    background:#007BFF;
    border-radius:10px;
    text-decoration:none;
    color:white;
    font-weight:bold;
    transition:0.3s;
}

.volver:hover{
    transform:scale(1.1);
    background:#cc0000;
}
</style>
</head>

<body>

<h1>ACTIVIDAD N°4</h1>
<p>SELECCIONE UN EJERCICIO</p>

<div class="contenedor">

    <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
        <div class="card-content">
            <h2>📊 Ejercicio 1</h2>
            <a href="Actividad 4/ejercicio 1.html">Abrir</a>
        </div>
    </div>

    <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/854/854878.png">
        <div class="card-content">
            <h2>📍 Ejercicio 2</h2>
            <a href="Actividad 4/ejercicio 2.html">Abrir</a>
        </div>
    </div>

    <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/2103/2103633.png">
        <div class="card-content">
            <h2>📈 Ejercicio 3</h2>
            <a href="Actividad 4/ejercicio 3.html">Abrir</a>
        </div>
    </div>

</div>

<!-- BOTON ABAJO 🔥 -->
<a href="index.html" class="volver">⬅ Volver al menú</a>

</body>
</html>
