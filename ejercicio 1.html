<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GRÁFICO DE BARRAS DINÁMICO</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background: linear-gradient(135deg,#489fc5,#0eb5a7,#2c5364);
    color:rgb(0, 0, 0);
}

/* BOTON VOLVER 🔥 */
.volver{
    position:absolute;
    top:20px;
    left:20px;
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:#ff4d4d;
    color:white;
    cursor:pointer;
    font-weight:bold;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
    transition:0.3s;
}
.volver:hover{
    background:#cc0000;
    transform:scale(1.1);
}

/* CONTENEDOR */
.grafico{
    width:900px;
    height:420px;
    margin:20px auto;
    position:relative;
    border:4px solid black;
    border-radius:15px;
    background:rgba(255,255,255,0.05);
}

/* BOTONES */
.controles{
    margin:15px auto 30px auto;
}

button{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

.iniciar{background:#00cc66;}
.pausar{background:#ff4d4d;}
.actualizar{background:#3399ff;}
.random{background:#ffcc00; color:black;}

/* AREA */
.area{
    position:absolute;
    left:80px;
    right:30px;
    top:30px;
    bottom:30px;
}

/* EJE */
.eje{
    position:absolute;
    left:10px;
    top:30px;
    bottom:30px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    font-size:13px;
    font-weight:bold;
}

/* GRID */
.linea{
    position:absolute;
    left:80px;
    right:30px;
    height:1px;
    background:rgba(255,255,255,0.25);
}

/* BARRAS */
.barra-contenedor{
    position:absolute;
    bottom:0;
    width:70px;
}

.barra{
    position:absolute;
    bottom:0;
    width:100%;
    height:0;
    border-radius:10px 10px 0 0;
    transition:height 0.6s ease;
}

.valor{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    bottom:0;
    margin-bottom:5px;
    font-weight:bold;
}
</style>
</head>

<body>

<!-- BOTON VOLVER 🔙 -->
<button class="volver" onclick="volver()">⬅ Volver</button>

<h2>GRAFICO DE BARRAS DINAMICO</h2>
<h2>REALIZADO POR: JOSEPH ABIUD CRUZ ACEVEDO</h2>

<!-- GRAFICO -->
<div class="grafico" id="grafico">

    <div class="eje">
        <span>100%</span>
        <span>80%</span>
        <span>60%</span>
        <span>40%</span>
        <span>20%</span>
        <span>0%</span>
    </div>

    <div class="area" id="area"></div>

</div>

<!-- BOTONES -->
<div class="controles">
    <button class="iniciar" onclick="iniciar()">▶ Iniciar</button>
    <button class="pausar" onclick="pausar()">⏸ Pausar</button>
    <button class="actualizar" onclick="reiniciar()">🔄 Reiniciar</button>
    <button class="random" onclick="randomRapido()">🎲 Random</button>
</div>

<script>
const area = document.getElementById("area");
const grafico = document.getElementById("grafico");

const NUM_BARRAS = 5;
let barras = [];
let valores = [];
let intervalo = null;

function crearBarras(){
    const ancho = area.clientWidth;
    const espacio = ancho / NUM_BARRAS;

    for(let i=0;i<NUM_BARRAS;i++){
        let cont = document.createElement("div");
        cont.classList.add("barra-contenedor");
        cont.style.left = (i * espacio + espacio/2 - 35) + "px";

        let barra = document.createElement("div");
        barra.classList.add("barra");

        let valor = document.createElement("div");
        valor.classList.add("valor");
        valor.textContent = "0%";

        cont.appendChild(barra);
        cont.appendChild(valor);
        area.appendChild(cont);

        barras.push(barra);
        valores.push(valor);
    }
}

function crearLineas(){
    const altura = area.clientHeight;

    for(let i=0;i<=5;i++){
        let linea = document.createElement("div");
        linea.classList.add("linea");

        let y = (i/5)*altura;
        linea.style.bottom = (30 + y) + "px";

        grafico.appendChild(linea);
    }
}

function generarDatos(){
    const ALTURA = area.clientHeight;

    barras.forEach((barra,i)=>{
        let valor = Math.floor(Math.random()*91)+10;
        let altura = (valor/100)*ALTURA;

        barra.style.height = altura + "px";
        valores[i].style.bottom = altura + "px";
        valores[i].textContent = valor + "%";

        if(valor<40){
            barra.style.background="#ff4d4d";
        }else if(valor<70){
            barra.style.background="#ffff66";
        }else{
            barra.style.background="#00ff99";
        }
    });
}

function iniciar(){
    if(!intervalo){
        intervalo = setInterval(generarDatos,1000);
    }
}

function pausar(){
    clearInterval(intervalo);
    intervalo = null;
}

function reiniciar(){
    pausar();
    barras.forEach((barra,i)=>{
        barra.style.height = "0px";
        valores[i].style.bottom = "0px";
        valores[i].textContent = "0%";
    });
}

function randomRapido(){
    barras.forEach((barra,i)=>{
        let valor = Math.floor(Math.random()*100);
        let altura = (valor/100)*area.clientHeight;

        barra.style.transition="none";
        barra.style.height = altura + "px";
        valores[i].style.bottom = altura + "px";
        valores[i].textContent = valor + "%";

        setTimeout(()=>barra.style.transition="0.6s ease",50);
    });
}

/* FUNCION VOLVER 🔙 */
function volver(){
    window.location.href = "actividad 4.html";
}

crearBarras();
crearLineas();
generarDatos();
</script>

</body>
</html>
