<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CURVA DINÁMICA DE LA FUNCIÓN COSENO</title>

<style>
body{
    background: linear-gradient(135deg,#1f4037,#99f2c8);
    text-align:center;
    font-family:Arial;
}
/* BOTON VOLVER 🔥 */
.volver{
    position:absolute;
    top:20px;
    left:20px;
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:#ff4d4d;
    color:white;
    cursor:pointer;
    font-weight:bold;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
    transition:0.3s;
}
.volver:hover{
    background:#cc0000;
    transform:scale(1.1);
}


canvas{
    background:#f5f5f5;
    border-radius:20px;
    border:3px solid black;
    margin-top:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

button{
    padding:10px 15px;
    margin:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.iniciar{background:#00cc66;}
.pausar{background:#ff4d4d;}
.limpiar{background:#3399ff;}
</style>
</head>

<body>
<!-- BOTON VOLVER 🔙 -->
<button class="volver" onclick="volver()">⬅ Volver</button>
<h2>CURVA DINÁMICA DE LA FUNCIÓN COSENO</h2>
<H2>REALIZADO POR: JOSEPH ABIUD CRUZ ACEVEDO</H2>

<canvas id="canvas" width="900" height="450"></canvas>

<div>
    <button class="iniciar" onclick="iniciar()">▶ Iniciar</button>
    <button class="pausar" onclick="pausar()">⏸ Pausar</button>
    <button class="limpiar" onclick="limpiar()">🧹 Limpiar</button>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const escala = 50;
let desplazamiento = 0;
let animacion = null;

/* CONVERSION */
function toX(x){
    return canvas.width/2 + x*escala;
}

function toY(y){
    return canvas.height/2 - y*escala;
}

/* CUADRICULA */
function dibujarCuadricula(){
    for(let x=0;x<=canvas.width;x+=escala){
        ctx.beginPath();
        ctx.moveTo(x,0);
        ctx.lineTo(x,canvas.height);
        ctx.strokeStyle="rgba(0,0,0,0.1)";
        ctx.stroke();
    }

    for(let y=0;y<=canvas.height;y+=escala){
        ctx.beginPath();
        ctx.moveTo(0,y);
        ctx.lineTo(canvas.width,y);
        ctx.strokeStyle="rgba(0,0,0,0.1)";
        ctx.stroke();
    }
}

/* EJES */
function dibujarEjes(){
    ctx.strokeStyle="black";
    ctx.lineWidth=2;

    ctx.beginPath();
    ctx.moveTo(0, canvas.height/2);
    ctx.lineTo(canvas.width, canvas.height/2);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(canvas.width/2,0);
    ctx.lineTo(canvas.width/2,canvas.height);
    ctx.stroke();

    ctx.fillStyle="black";
    ctx.fillText("Eje X", canvas.width-70, canvas.height/2-10);
    ctx.fillText("Eje Y", canvas.width/2+10, 20);
}

/* NUMEROS */
function dibujarNumeros(){
    ctx.fillStyle="black";
    ctx.font="12px Arial";

    let maxX = Math.floor(canvas.width/(2*escala));
    let maxY = Math.floor(canvas.height/(2*escala));

    for(let x=-maxX; x<=maxX; x++){
        let px = toX(x);
        ctx.fillText(x, px-5, canvas.height/2 + 15);
    }

    for(let y=-maxY; y<=maxY; y++){
        if(y!==0){
            let py = toY(y);
            ctx.fillText(y, canvas.width/2 + 5, py+3);
        }
    }
}

/* CURVA COSENO DINAMICA */
function dibujarCoseno(){
    ctx.beginPath();
    ctx.lineWidth=3;
    ctx.strokeStyle="#0077ff";

    let inicio = -canvas.width/(2*escala);
    let fin = canvas.width/(2*escala);

    for(let x=inicio; x<=fin; x+=0.02){
        let y = Math.cos(x + desplazamiento);

        let px = toX(x);
        let py = toY(y);

        if(x === inicio){
            ctx.moveTo(px,py);
        }else{
            ctx.lineTo(px,py);
        }
    }

    ctx.stroke();
}

/* PUNTO EN MOVIMIENTO */
function puntoActual(){
    let x = 0;
    let y = Math.cos(x + desplazamiento);

    let px = toX(x);
    let py = toY(y);

    ctx.beginPath();
    ctx.arc(px, py, 6, 0, Math.PI*2);
    ctx.fillStyle="red";
    ctx.fill();

    ctx.fillStyle="black";
    ctx.fillText(`cos(x)=${y.toFixed(2)}`, px+10, py-10);
}

/* ACTUALIZACION CONTINUA */
function actualizar(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    dibujarCuadricula();
    dibujarEjes();
    dibujarNumeros();
    dibujarCoseno();
    puntoActual();

    desplazamiento += 0.05; // movimiento infinito 🔥
}

/* BOTONES */
function iniciar(){
    if(!animacion){
        animacion = setInterval(actualizar,50);
    }
}

function pausar(){
    clearInterval(animacion);
    animacion = null;
}

function limpiar(){
    pausar();
    desplazamiento = 0;

    ctx.clearRect(0,0,canvas.width,canvas.height);
    dibujarCuadricula();
    dibujarEjes();
    dibujarNumeros();
}
/* FUNCION VOLVER 🔙 */
function volver(){
    window.location.href = "actividad 4.html";
}
/* INICIO AUTOMATICO 🔥 */
iniciar();
</script>

</body>
</html>
